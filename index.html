<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0f19" />
  <title>ChasingMajors Checklist (Beta)</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b0f19;
      color: #e5e7eb;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 14px; }
    .card {
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,.25);
    }

    .row { display:flex; gap:10px; align-items:center; flex-wrap: wrap; }
    .h1 { font-size: 18px; font-weight: 800; margin: 0; }
    .sub { color:#9ca3af; font-size: 13px; margin-top: 4px; }
    .pill {
      display:inline-flex; align-items:center;
      padding: 5px 10px; border-radius: 999px;
      border: 1px solid #263244; background: #0b1222;
      font-size: 12px; color: #d1d5db;
      white-space: nowrap;
    }

    input, select, button {
      background: #0b1222;
      border: 1px solid #263244;
      color: #e5e7eb;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      min-width: 0;
    }
    input { width: 100%; }
    button { cursor: pointer; }
    button:hover { border-color: #3b82f6; }
    .divider { height:1px; background:#1f2937; margin: 12px 0; }

    /* Tabs */
    .tabs {
      display:flex;
      gap:8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .tab {
      white-space: nowrap;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid #263244;
      background:#0b1222;
      cursor:pointer;
      font-size: 13px;
      flex: 0 0 auto;
    }
    .tab.active { border-color:#3b82f6; }

    /* Results list */
    .resultsBox {
      margin-top: 10px;
      border: 1px solid #1f2937;
      border-radius: 12px;
      overflow:hidden;
      background:#0b1222;
    }
    .resultsBox .r { padding: 10px 12px; border-bottom: 1px solid #1f2937; }
    .resultsBox .r:last-child { border-bottom:none; }
    .rTop { font-size: 14px; }
    .rSub { font-size: 12px; color:#9ca3af; margin-top: 3px; }

    .badge {
      display:inline-flex; padding:2px 7px; border-radius: 999px;
      border:1px solid #334155; background:#0b1222;
      font-size: 11px; margin-left: 8px; color:#e5e7eb;
    }

    .btnRow { display:flex; gap:10px; flex-wrap:wrap; margin-top: 10px; }
    .btnGhost { background:#0b1222; }
    .btnPrimary { border-color:#3b82f6; }

    /* Set view */
    .setHeaderTitle { font-size: 16px; font-weight: 900; }
    .setHeaderSub { color:#9ca3af; font-size: 13px; margin-top: 4px; }
    .sectionBlock { margin-top: 14px; }
    .subsetTitle { font-weight: 900; margin-top: 12px; }
    .subsetMeta { color:#9ca3af; font-size: 12px; margin-top: 2px; }

    /* Parallels font matches checklist */
    .parTitle { margin-top: 8px; font-weight: 900; font-size: 14px; }
    ul.par { margin: 6px 0 0 0; padding-left: 16px; color:#d1d5db; font-size: 14px; }
    ul.par li { margin: 4px 0; font-size: 14px; }

    /* Typeahead dropdown */
    .typeaheadWrap { position: relative; flex: 1 1 0; min-width: 0; }
    .typeaheadList {
      position: absolute;
      left: 0; right: 0;
      top: calc(100% + 6px);
      z-index: 50;
      border: 1px solid #263244;
      background: #0b1222;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      display: none;
      max-height: 260px;
      overflow-y: auto;
    }
    .typeaheadItem {
      padding: 10px 12px;
      border-bottom: 1px solid #1f2937;
      cursor: pointer;
    }
    .typeaheadItem:last-child { border-bottom: none; }
    .typeaheadItem:hover { background: #0f1b33; }
    .typeaheadTitle { font-size: 14px; font-weight: 700; }
    .typeaheadSub { font-size: 12px; color:#9ca3af; margin-top: 2px; }

    /* Search row layout (prevents overlap) */
    .searchRow { flex-wrap: nowrap; align-items: stretch; }
    .sportSel { flex: 0 0 150px; }
    .searchBtn { flex: 0 0 96px; }

    @media (max-width: 560px) {
      .searchRow { flex-wrap: wrap; }
      .sportSel { flex: 1 1 140px; }
      .searchBtn { flex: 1 1 100px; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Search card -->
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div class="h1">Checklist Viewer (Beta)</div>
          <div class="sub">Search a set (e.g., “2026 Topps Series 1”) or a player (e.g., “Aaron Judge”).</div>
        </div>
        <div class="pill" id="apiPill">API: checking…</div>
      </div>

      <div class="divider"></div>

      <div class="row searchRow">
        <select id="sport" class="sportSel">
          <option value="baseball">Baseball</option>
          <option value="basketball">Basketball</option>
          <option value="football">Football</option>
          <option value="soccer">Soccer</option>
          <option value="hockey">Hockey</option>
        </select>

        <div class="typeaheadWrap">
          <input id="search" placeholder="Search…" autocomplete="off" />
          <div id="typeahead" class="typeaheadList"></div>
        </div>

        <button id="go" class="btnPrimary searchBtn">Search</button>
      </div>

      <div class="btnRow">
        <button id="moreSearch" class="btnGhost" style="display:none;">Show more</button>
        <div class="pill" id="countPill" style="display:none;">0 results</div>
      </div>

      <!-- Search results (player/subset search mode) -->
      <div id="searchResults" class="resultsBox" style="display:none;"></div>
    </div>

    <div style="height:12px;"></div>

    <!-- Set viewer card -->
    <div class="card" id="setView" style="display:none;">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div class="setHeaderTitle" id="setTitle">Base Checklist</div>
          <div class="setHeaderSub" id="setMeta">Loading…</div>
        </div>
        <div class="pill" id="setCode">code</div>
      </div>

      <div class="divider"></div>

      <div class="tabs" id="setTabs"></div>

      <div id="setBody"></div>
    </div>

  </div>

  <script src="./app.js"></script>
</body>
</html>
