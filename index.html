<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0f19" />
  <title>Checklist Viewer (Beta)</title>
  <link rel="manifest" href="./manifest.webmanifest" />

  <!-- Bangers font (matches Print Run Vault vibe) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #0b0f19;
      --panel: #0f172a;
      --panel2: #0b1222;
      --border: #1f2937;
      --border2: #263244;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --shadow: rgba(0,0,0,.25);

      --btnPrimaryBg: #ffffff;
      --btnPrimaryText: #0b0f19;
      --btnGhostBg: transparent;
      --btnGhostBorder: #2b3448;

      --homeBarBg: rgba(15,23,42,.85);
      --homeBarBorder: rgba(31,41,55,.9);

      --pillBg: #0b1222;
      --pillBorder: #263244;

      --inputBg: #0b1222;
      --inputBorder: #263244;

      --icon: #cbd5e1;
      --accent: #ffffff;
    }

    /* Light theme mirrors PRV */
    html[data-theme="light"]{
      --bg: #f3f4f6;
      --panel: #ffffff;
      --panel2: #f8fafc;
      --border: #e5e7eb;
      --border2: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --shadow: rgba(0,0,0,.08);

      --btnPrimaryBg: #111827;
      --btnPrimaryText: #ffffff;
      --btnGhostBg: transparent;
      --btnGhostBorder: #d1d5db;

      --homeBarBg: rgba(255,255,255,.85);
      --homeBarBorder: rgba(229,231,235,.95);

      --pillBg: #ffffff;
      --pillBorder: #d1d5db;

      --inputBg: #ffffff;
      --inputBorder: #d1d5db;

      --icon: #111827;
      --accent: #111827;
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 74px; /* space for bottom home bar */
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 14px;
    }

    /* Top header like Print Run Vault */
    .topbar{
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 14px 10px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,0));
      backdrop-filter: blur(6px);
    }

    html[data-theme="light"] .topbar{
      background: linear-gradient(to bottom, rgba(255,255,255,.75), rgba(255,255,255,0));
    }

    .brandRow{
      display:flex;
      align-items:center;
      justify-content:center;
      position: relative;
    }

    .brand{
      font-family: "Bangers", system-ui, sans-serif;
      font-size: 44px;
      letter-spacing: 1px;
      line-height: 1;
      text-align: center;
      margin: 0;
      color: var(--accent);
      text-transform: uppercase;
      user-select: none;
    }

    .topRight{
      position:absolute;
      right: 0;
      display:flex;
      gap: 10px;
      align-items:center;
    }

    .iconBtn{
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border2);
      background: rgba(255,255,255,.04);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor: pointer;
      box-shadow: 0 6px 18px var(--shadow);
    }
    html[data-theme="light"] .iconBtn{
      background: rgba(0,0,0,.02);
    }
    .iconBtn:hover{ border-color: #3b82f6; }

    .icon{
      width: 18px; height: 18px;
      fill: none;
      stroke: var(--icon);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .sub{
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 10px 0;
      font-weight: 600;
    }

    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

    .pill{
      display:inline-flex;
      align-items:center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--pillBorder);
      background: var(--pillBg);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    input, select, button{
      font-family: inherit;
      border-radius: 12px;
      padding: 12px 12px;
      font-size: 14px;
      outline: none;
      min-width: 0;
    }

    select{
      background: var(--inputBg);
      border: 1px solid var(--inputBorder);
      color: var(--text);
      padding-right: 34px;
    }

    /* Search input with magnifying glass */
    .searchWrap{
      position: relative;
      width: 100%;
    }

    .searchWrap input{
      width: 100%;
      background: var(--inputBg);
      border: 1px solid var(--inputBorder);
      color: var(--text);
      padding-left: 42px;
      height: 46px;
    }

    .searchIcon{
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      stroke: var(--muted);
      stroke-width: 2;
      fill: none;
      pointer-events: none;
    }

    /* Buttons like PRV */
    .btn{
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--border2);
      cursor: pointer;
      font-weight: 800;
    }

    .btnPrimary{
      background: var(--btnPrimaryBg);
      color: var(--btnPrimaryText);
      border-color: transparent;
    }

    .btnGhost{
      background: var(--btnGhostBg);
      color: var(--text);
      border-color: var(--btnGhostBorder);
    }

    .btn:active{ transform: translateY(1px); }

    .divider{
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    /* Tabs */
    .tabs{
      display:flex;
      gap:8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      margin-top: 6px;
    }
    .tab{
      white-space: nowrap;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border2);
      background: var(--panel2);
      cursor:pointer;
      font-size: 13px;
      flex: 0 0 auto;
      color: var(--text);
    }
    .tab.active{ border-color:#3b82f6; }

    /* Results */
    .resultsBox{
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow:hidden;
      background: var(--panel2);
    }
    .resultsBox .r{
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .resultsBox .r:last-child{ border-bottom:none; }
    .rTop{ font-size: 14px; }
    .rSub{ font-size: 12px; color: var(--muted); margin-top: 3px; }

    .badge{
      display:inline-flex;
      padding:2px 7px;
      border-radius: 999px;
      border:1px solid var(--border2);
      background: var(--panel2);
      font-size: 11px;
      margin-left: 8px;
      color: var(--text);
    }

    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 10px;
      align-items:center;
      justify-content: space-between;
    }

    /* Set view typography */
    .setHeaderTitle{ font-size: 18px; font-weight: 950; margin:0; }
    .setHeaderSub{ color: var(--muted); font-size: 13px; margin-top: 4px; }

    .sectionBlock{ margin-top: 14px; }
    .subsetTitle{ font-weight: 950; margin-top: 12px; }
    .subsetMeta{ color: var(--muted); font-size: 12px; margin-top: 2px; }

    .parTitle{ margin-top: 8px; font-weight: 900; font-size: 14px; }
    ul.par{ margin: 6px 0 0 0; padding-left: 16px; font-size: 14px; }
    ul.par li{ margin: 4px 0; font-size: 14px; color: var(--text); }

    /* Typeahead dropdown */
    .typeaheadList{
      position: absolute;
      left: 0; right: 0;
      top: calc(100% + 8px);
      z-index: 50;
      border: 1px solid var(--border2);
      background: var(--panel2);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      display: none;
      max-height: 280px;
      overflow-y: auto;
    }
    .typeaheadItem{
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .typeaheadItem:last-child{ border-bottom: none; }
    .typeaheadItem:hover{ background: rgba(59,130,246,.10); }
    .typeaheadTitle{ font-size: 14px; font-weight: 900; }
    .typeaheadSub{ font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Bottom home bar (kept for future app merge) */
    .homeBar{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 10px 14px 12px 14px;
      z-index: 40;
      background: linear-gradient(to top, var(--bg), rgba(0,0,0,0));
      pointer-events: none;
    }
    html[data-theme="light"] .homeBar{
      background: linear-gradient(to top, var(--bg), rgba(255,255,255,0));
    }

    .homeBarInner{
      max-width: 980px;
      margin: 0 auto;
      border-radius: 14px;
      border: 1px solid var(--homeBarBorder);
      background: var(--homeBarBg);
      height: 46px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 10px 24px var(--shadow);
      pointer-events: auto;
    }

    .homeBtn{
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor: pointer;
    }
    .homeBtn:hover{ background: rgba(59,130,246,.08); }

    @media (max-width: 560px){
      .brand{ font-size: 40px; }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="topbar">
    <div class="brandRow">
      <div class="brand">Checklist Search</div>

      <div class="topRight">
        <div class="pill" id="apiPill">API: checking…</div>

        <button class="iconBtn" id="themeToggle" aria-label="Toggle theme">
          <!-- moon/sun icon swaps in JS -->
          <svg class="icon" viewBox="0 0 24 24" id="themeIcon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="wrap">

    <!-- Search card (PRV-style layout) -->
    <div class="card">
      <div class="sub">Checklist data, not screenshots.</div>

      <div class="row" style="justify-content:space-between;">
        <div class="pill" id="sportPillWrap">
          <span style="margin-right:8px;">Sport</span>
          <select id="sport" style="border:none; padding:0; height:auto; background:transparent;">
            <option value="baseball">Baseball</option>
            <option value="basketball">Basketball</option>
            <option value="football">Football</option>
            <option value="soccer">Soccer</option>
            <option value="hockey">Hockey</option>
          </select>
        </div>

        <div class="pill" id="countPill" style="display:none;">0 results</div>
      </div>

      <div style="height:10px;"></div>

      <!-- Search input with icon + typeahead -->
      <div class="searchWrap" id="searchWrap">
        <svg class="searchIcon" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>

        <input id="search" placeholder="Search the tool" autocomplete="off" />
        <div id="typeahead" class="typeaheadList"></div>
      </div>

      <div style="height:10px;"></div>

      <!-- Buttons below input (PRV consistency) -->
      <button id="go" class="btn btnPrimary">Search</button>

      <div style="height:10px;"></div>

      <button id="browse" class="btn btnGhost">Browse</button>

      <div style="height:10px;"></div>

      <button id="clearBtn" class="btn btnGhost">Clear</button>

      <div class="btnRow">
        <button id="moreSearch" class="btn btnGhost" style="display:none; width:auto; padding: 10px 14px; height:auto;">Show more</button>
      </div>

      <!-- Search results (player/subset search mode) -->
      <div id="searchResults" class="resultsBox" style="display:none;"></div>
    </div>

    <div style="height:12px;"></div>

    <!-- Set viewer card -->
    <div class="card" id="setView" style="display:none;">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div class="setHeaderTitle" id="setTitle">Base Checklist</div>
          <div class="setHeaderSub" id="setMeta">Loading…</div>
        </div>
        <div class="pill" id="setCode">code</div>
      </div>

      <div class="divider"></div>

      <div class="tabs" id="setTabs"></div>

      <div id="setBody"></div>
    </div>

  </div>

  <!-- Browse Modal -->
  <div id="browseModal" style="display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.55);">
    <div style="max-width:820px; margin:8vh auto; padding:14px;">
      <div class="card">
        <div class="row" style="justify-content:space-between;">
          <div>
            <div style="font-size:18px; font-weight:950;">Loaded Checklists</div>
            <div class="sub" style="margin-top:6px;">Browse what’s currently in the tool.</div>
          </div>
          <button id="browseClose" class="btn btnGhost" style="width:auto; height:auto; padding:10px 14px;">Close</button>
        </div>

        <div class="divider"></div>

        <div class="searchWrap">
          <svg class="searchIcon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
          <input id="browseFilter" placeholder="Filter loaded checklists…" />
        </div>

        <div id="browseList" class="resultsBox" style="margin-top:12px;"></div>

        <div class="btnRow">
          <button id="browseMore" class="btn btnGhost" style="display:none; width:auto; height:auto; padding:10px 14px;">Load more</button>
          <div class="pill" id="browsePill" style="display:none;">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Home Bar -->
  <div class="homeBar">
    <div class="homeBarInner">
      <div class="homeBtn" id="homeBtn" aria-label="Home">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M3 10.5L12 3l9 7.5"></path>
          <path d="M5 10v10h14V10"></path>
        </svg>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
