<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0f19" />
  <title>ChasingMajors Checklist (Beta)</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b0f19;
      color: #e5e7eb;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 14px; }
    .card {
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,.25);
    }
    .row { display:flex; gap:10px; align-items:center; flex-wrap: wrap; }
    .h1 { font-size: 18px; font-weight: 800; margin: 0; }
    .sub { color:#9ca3af; font-size: 13px; margin-top: 4px; }
    .pill {
      display:inline-flex; align-items:center;
      padding: 5px 10px; border-radius: 999px;
      border: 1px solid #263244; background: #0b1222;
      font-size: 12px; color: #d1d5db;
    }
    input, select, button {
      background: #0b1222;
      border: 1px solid #263244;
      color: #e5e7eb;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }
    input { width: 100%; }
    button { cursor: pointer; }
    button:hover { border-color: #3b82f6; }
    .divider { height:1px; background:#1f2937; margin: 12px 0; }
    .tabs { display:flex; gap:8px; flex-wrap: wrap; }
    .tab { padding: 7px 10px; border-radius: 999px; border: 1px solid #263244; background:#0b1222; cursor:pointer; font-size: 13px; }
    .tab.active { border-color:#3b82f6; }
    .list { margin:0; padding:0; list-style:none; }
    .list li { padding: 10px 0; border-bottom: 1px solid #1f2937; }
    .list li:last-child { border-bottom: none; }
    .line { font-size: 14px; }
    .meta { color:#9ca3af; font-size: 12px; margin-top: 4px; }
    .badge {
      display:inline-flex; padding:2px 7px; border-radius: 999px;
      border:1px solid #334155; background:#0b1222;
      font-size: 11px; margin-left: 8px; color:#e5e7eb;
    }
    .sectionTitle { font-size: 16px; font-weight: 800; }
    .parTitle { margin-top: 10px; font-weight: 800; }
    ul.par { margin: 6px 0 0 0; padding-left: 16px; color:#d1d5db; }
    ul.par li { margin: 4px 0; }

    .resultsBox { margin-top: 10px; border: 1px solid #1f2937; border-radius: 12px; overflow:hidden; }
    .resultsBox .r { padding: 10px 12px; border-bottom: 1px solid #1f2937; cursor:pointer; }
    .resultsBox .r:last-child { border-bottom:none; }
    .resultsBox .r:hover { background:#0b1222; }
    .rTop { font-size: 14px; }
    .rSub { font-size: 12px; color:#9ca3af; margin-top: 3px; }

    .footerRow { display:flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items:center; }
    .pager { display:flex; gap:8px; align-items:center; }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div class="h1">Checklist (Beta)</div>
          <div class="sub">One search bar. Find sets or find players. Built for mobile first.</div>
        </div>
        <div class="pill" id="apiPill">API: not checked</div>
      </div>

      <div class="divider"></div>

      <div class="row">
        <select id="sport" style="flex:0 0 150px;">
          <option value="baseball">baseball</option>
          <option value="basketball">basketball</option>
          <option value="football">football</option>
          <option value="soccer">soccer</option>
          <option value="hockey">hockey</option>
        </select>

        <select id="mode" style="flex:0 0 140px;">
          <option value="products">Products</option>
          <option value="cards">Cards</option>
        </select>

        <div style="flex:1 1 280px;">
          <input id="search" placeholder="Search: 2026 Topps Series 1 … or Aaron Judge …" />
        </div>

        <button id="go" style="flex:0 0 90px;">Search</button>
      </div>

      <div class="sub" style="margin-top:8px;">
        API Base (stored locally):
        <input id="apiBase" style="margin-top:6px;" />
      </div>

      <div id="searchResults" class="resultsBox" style="display:none;"></div>
    </div>

    <div style="height: 12px;"></div>

    <div class="card" id="viewer" style="display:none;">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div class="sectionTitle" id="viewerTitle">Base Checklist</div>
          <div class="sub" id="viewerSub">0 Cards</div>
        </div>
        <div class="pill" id="viewerCode">code</div>
      </div>

      <div class="divider"></div>

      <div class="tabs" id="sectionTabs"></div>

      <div class="divider"></div>

      <div class="row">
        <select id="subset" style="flex:1 1 240px;"></select>
        <input id="playerFilter" placeholder="Filter inside this product (player name) …" style="flex:1 1 240px;" />
        <select id="tag" style="flex:0 0 120px;">
          <option value="">Tag</option>
          <option value="RC">RC</option>
          <option value="LL">LL</option>
          <option value="RD">RD</option>
          <option value="SP">SP</option>
          <option value="SSP">SSP</option>
        </select>
        <button id="apply" style="flex:0 0 90px;">Apply</button>
      </div>

      <div class="parTitle">Parallels:</div>
      <ul class="par" id="parallels"></ul>

      <div class="divider"></div>

      <div class="footerRow">
        <div class="sub" id="resultsMeta">Results: 0</div>
        <div class="pager">
          <button id="prev">Prev</button>
          <span class="sub" id="pageMeta">Page 1</span>
          <button id="next">Next</button>
        </div>
      </div>

      <ul class="list" id="cards"></ul>
    </div>

    <div class="card" id="emptyViewer" style="display:block;">
      <div class="sub">Search for a product (Products mode) or a player (Cards mode) to begin.</div>
    </div>

  </div>

  <script src="./app.js"></script>
</body>
</html>
