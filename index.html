<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b0f19" />
  <title>ChasingMajors Checklist (Beta)</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b0f19;
      color: #e5e7eb;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 14px; }
    .card {
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,.25);
    }
    .row { display:flex; gap:10px; align-items:center; flex-wrap: wrap; }
    .h1 { font-size: 18px; font-weight: 800; margin: 0; }
    .sub { color:#9ca3af; font-size: 13px; margin-top: 4px; }
    .pill {
      display:inline-flex; align-items:center;
      padding: 5px 10px; border-radius: 999px;
      border: 1px solid #263244; background: #0b1222;
      font-size: 12px; color: #d1d5db;
    }
    input, select, button {
      background: #0b1222;
      border: 1px solid #263244;
      color: #e5e7eb;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }
    input { width: 100%; }
    button { cursor: pointer; }
    button:hover { border-color: #3b82f6; }
    .divider { height:1px; background:#1f2937; margin: 12px 0; }

    /* Tabs */
    .tabs {
      display:flex;
      gap:8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .tab {
      white-space: nowrap;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid #263244;
      background:#0b1222;
      cursor:pointer;
      font-size: 13px;
      flex: 0 0 auto;
    }
    .tab.active { border-color:#3b82f6; }

    /* Results list */
    .resultsBox { margin-top: 10px; border: 1px solid #1f2937; border-radius: 12px; overflow:hidden; }
    .resultsBox .r { padding: 10px 12px; border-bottom: 1px solid #1f2937; }
    .resultsBox .r:last-child { border-bottom:none; }
    .rTop { font-size: 14px; }
    .rSub { font-size: 12px; color:#9ca3af; margin-top: 3px; }

    .badge {
      display:inline-flex; padding:2px 7px; border-radius: 999px;
      border:1px solid #334155; background:#0b1222;
      font-size: 11px; margin-left: 8px; color:#e5e7eb;
    }

    .btnRow { display:flex; gap:10px; flex-wrap:wrap; margin-top: 10px; }
    .btnGhost { background:#0b1222; }
    .btnPrimary { border-color:#3b82f6; }

    /* Set view */
    .setHeaderTitle { font-size: 16px; font-weight: 900; }
    .setHeaderSub { color:#9ca3af; font-size: 13px; margin-top: 4px; }
    .sectionBlock { margin-top: 14px; }
    .subsetTitle { font-weight: 900; margin-top: 12px; }
    .subsetMeta { color:#9ca3af; font-size: 12px; margin-top: 2px; }

    .parTitle { margin-top: 8px; font-weight: 900; }
    ul.par { margin: 6px 0 0 0; padding-left: 16px; color:#d1d5db; }
    ul.par li { margin: 4px 0; }

    ul.players { margin: 8px 0 0 0; padding-left: 16px; color:#e5e7eb; }
    ul.players li { margin: 4px 0; }

    .hint { margin-top: 10px; color:#9ca3af; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">

    <!-- Search card -->
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div class="h1">Checklist Viewer (Beta)</div>
          <div class="sub">Search a set (e.g., “2026 Topps Series 1”) or a player (e.g., “Aaron Judge”).</div>
        </div>
        <div class="pill" id="apiPill">API: not checked</div>
      </div>

      <div class="divider"></div>

      <div class="row">
        <select id="sport" style="flex:0 0 150px;">
          <option value="baseball">baseball</option>
          <option value="basketball">basketball</option>
          <option value="football">football</option>
          <option value="soccer">soccer</option>
          <option value="hockey">hockey</option>
        </select>

        <div style="flex:1 1 320px;">
          <input id="search" placeholder="Search…" />
        </div>

        <button id="go" style="flex:0 0 90px;" class="btnPrimary">Search</button>
      </div>

      <div class="sub" style="margin-top:8px;">
        API Base (stored locally):
        <input id="apiBase" style="margin-top:6px;" />
      </div>

      <div class="btnRow">
        <button id="backToSearch" class="btnGhost" style="display:none;">Back to search</button>
        <button id="moreSearch" class="btnGhost" style="display:none;">Show more</button>
        <div class="pill" id="countPill" style="display:none;">0 results</div>
      </div>

      <!-- Search results (player search mode) -->
      <div id="searchResults" class="resultsBox" style="display:none;"></div>

      <div class="hint">
        Tags come from <b>Cards.tags</b> using <b>RC|LL|RD|SP|SSP</b>.
      </div>
    </div>

    <div style="height:12px;"></div>

    <!-- Set viewer card -->
    <div class="card" id="setView" style="display:none;">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div class="setHeaderTitle" id="setTitle">Base Checklist</div>
          <div class="setHeaderSub" id="setMeta">Loading…</div>
        </div>
        <div class="pill" id="setCode">code</div>
      </div>

      <div class="divider"></div>

      <div class="tabs" id="setTabs"></div>

      <div id="setBody"></div>
    </div>

  </div>

  <script src="./app.js"></script>
</body>
</html>
